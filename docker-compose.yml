# ─────────────────────────────────────────────────────────────────────────────
# SumPoint — Docker Compose (development)
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d                # start all services
#   docker compose up -d db redis       # infrastructure only (run app locally)
#   docker compose logs -f api          # tail API logs
#
# For production: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sumpoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sumpoint}
      POSTGRES_DB: ${POSTGRES_DB:-sumpoint}
    ports:
      - "5432:5432"  # exposed for local dev tools (psql, DBeaver, etc.)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sumpoint}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"  # exposed for local dev tools
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers --forwarded-allow-ips='*'"
    ports:
      - "8001:8000"
    networks:
      - coolify
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    # solo pool — async SQLAlchemy/asyncpg is not thread-safe across Celery's
    # threads pool; solo runs one task at a time in the main thread, which is
    # what _run()'s asyncio.run() bridge (app/tasks/base.py) expects.
    command: celery -A app.tasks.celery_app worker --loglevel=info --pool=solo
    env_file:
      - .env
    volumes:
      - .:/app
      - sessions:/app/sessions
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  sessions:
