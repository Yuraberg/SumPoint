version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sumpoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sumpoint}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sumpoint}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8001:8000"
    networks:
      - coolify
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-sumpoint}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sumpoint}}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_SESSION_STRING=${TELEGRAM_SESSION_STRING}
      - SECRET_KEY=${SECRET_KEY}
      - SESSION_ENCRYPTION_KEY=${SESSION_ENCRYPTION_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8001}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8001}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME}
    volumes:
      - sessions:/app/sessions
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 20s
      retries: 3

  bot:
    build: .
    command: python -m bot.bot
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_SESSION_STRING=${TELEGRAM_SESSION_STRING}
      - SECRET_KEY=${SECRET_KEY}
      - SESSION_ENCRYPTION_KEY=${SESSION_ENCRYPTION_KEY}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8001}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-sumpoint}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sumpoint}}
    volumes:
      - sessions:/app/sessions
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python -m bot.bot' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=info --pool=threads
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_SESSION_STRING=${TELEGRAM_SESSION_STRING}
      - SECRET_KEY=${SECRET_KEY}
      - SESSION_ENCRYPTION_KEY=${SESSION_ENCRYPTION_KEY}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-sumpoint}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sumpoint}}
      - POSTS_FETCH_BATCH_SIZE=${POSTS_FETCH_BATCH_SIZE:-20}
      - UPTIME_KUMA_PUSH_URL=${UPTIME_KUMA_PUSH_URL}
    volumes:
      - sessions:/app/sessions
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3

  beat:
    build: .
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DIGEST_MORNING_HOUR=${DIGEST_MORNING_HOUR:-8}
      - DIGEST_EVENING_HOUR=${DIGEST_EVENING_HOUR:-20}
      - POSTS_FETCH_INTERVAL_MINUTES=${POSTS_FETCH_INTERVAL_MINUTES:-20}
      - SECRET_KEY=${SECRET_KEY}
      - SESSION_ENCRYPTION_KEY=${SESSION_ENCRYPTION_KEY}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-sumpoint}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sumpoint}}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  coolify:
    external: true

volumes:
  pgdata:
  sessions:
