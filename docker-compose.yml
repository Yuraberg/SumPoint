version: "3.9"

services:
  # ── PostgreSQL + pgvector ───────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sumpoint
      POSTGRES_PASSWORD: sumpoint
      POSTGRES_DB: sumpoint
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sumpoint"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./sessions:/app/sessions

  # ── Celery worker ───────────────────────────────────────────────────────────
  worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./sessions:/app/sessions

  # ── Celery beat (scheduler) ─────────────────────────────────────────────────
  beat:
    build: .
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis

  # ── Telegram bot ────────────────────────────────────────────────────────────
  bot:
    build: .
    command: python -m bot.bot
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
