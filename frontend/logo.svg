<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="sp-bg" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0b1740"/>
    </radialGradient>
    <radialGradient id="sp-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0fbff" stop-opacity="1"/>
      <stop offset="45%" stop-color="#5fd9f2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#5fd9f2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sp-wing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eaf7ff"/>
      <stop offset="100%" stop-color="#6fb3e0"/>
    </linearGradient>
    <filter id="sp-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <circle cx="50" cy="50" r="50" fill="url(#sp-bg)"/>

  <circle cx="50" cy="25" r="8" fill="url(#sp-glow)" filter="url(#sp-blur)"/>
  <circle cx="50" cy="25" r="3" fill="#f2feff"/>

  <!-- Wings: outer sweep from the orb, flaring up-out to a tip, then diving
       down and inward to meet at the body; inner line echoes the same
       silhouette a touch tighter. Mirrored left/right. -->
  <g fill="none" stroke="url(#sp-wing)" stroke-linecap="round">
    <path d="M50,29 C58,22 68,21 74,15 C81,24 76,37 64,39 C57,40 52,46 50,54"
          stroke-width="1.6"/>
    <path d="M50,29 C42,22 32,21 26,15 C19,24 24,37 36,39 C43,40 48,46 50,54"
          stroke-width="1.6"/>

    <path d="M50,33 C55,29 61,29 65,25" stroke-width="1"/>
    <path d="M50,33 C45,29 39,29 35,25" stroke-width="1"/>

    <path d="M50,36 C56,34 61,36 63,41" stroke-width="1"/>
    <path d="M50,36 C44,34 39,36 37,41" stroke-width="1"/>
  </g>

  <!-- Stem flowing down from the body to the monogram. -->
  <g fill="none" stroke="url(#sp-wing)" stroke-width="1.4" stroke-linecap="round">
    <path d="M50,54 C45,62 43,70 45,79"/>
    <path d="M50,54 C55,62 57,70 55,79"/>
    <path d="M50,54 L50,66"/>
  </g>

  <text x="50" y="91" text-anchor="middle" font-family="Georgia, 'Iowan Old Style', serif"
        font-size="13" fill="#eaf7ff" letter-spacing="1">SP</text>
</svg>
