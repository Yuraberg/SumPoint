<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="sp-bg" cx="42%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#2a4f9e"/>
      <stop offset="55%" stop-color="#132a6e"/>
      <stop offset="100%" stop-color="#050e2c"/>
    </radialGradient>
    <radialGradient id="sp-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eafeff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#4fe0f5" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#4fe0f5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sp-wing" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#f2fbff"/>
      <stop offset="100%" stop-color="#8fc3ea"/>
    </linearGradient>
    <filter id="sp-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <clipPath id="sp-circle"><circle cx="50" cy="50" r="50"/></clipPath>
  </defs>

  <circle cx="50" cy="50" r="50" fill="url(#sp-bg)"/>

  <!-- faint constellation texture, lower-left -->
  <g clip-path="url(#sp-circle)" stroke="#9fc4ef" stroke-width=".3" opacity=".25">
    <line x1="10" y1="70" x2="18" y2="80"/>
    <line x1="18" y1="80" x2="14" y2="90"/>
    <line x1="18" y1="80" x2="28" y2="84"/>
    <line x1="6" y1="58" x2="14" y2="66"/>
    <line x1="30" y1="92" x2="22" y2="86"/>
  </g>
  <g clip-path="url(#sp-circle)" fill="#cfe6fb" opacity=".4">
    <circle cx="10" cy="70" r=".6"/><circle cx="18" cy="80" r=".7"/>
    <circle cx="14" cy="90" r=".5"/><circle cx="28" cy="84" r=".5"/>
    <circle cx="6" cy="58" r=".5"/><circle cx="14" cy="66" r=".5"/>
    <circle cx="30" cy="92" r=".5"/><circle cx="22" cy="86" r=".5"/>
  </g>

  <!-- glow + orb -->
  <circle cx="50" cy="28" r="10" fill="url(#sp-glow)" filter="url(#sp-blur)"/>
  <path d="M50,34 L50,42" stroke="url(#sp-glow)" stroke-width="3" opacity=".7" filter="url(#sp-blur)"/>
  <circle cx="50" cy="28" r="3.2" fill="#fbffff"/>

  <!-- wings: each side has an outer + inner membrane line that sweeps from a
       tip near the top, out and down, crossing past centre to build the X,
       then tapers into the tail/stem below. -->
  <g fill="none" stroke="url(#sp-wing)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M53,32 C64,25 72,21 77,13 C85,27 76,42 60,45 C50,47 45,54 45,64"
          stroke-width="1.5"/>
    <path d="M55,36 C63,30 68,27 71,21 C76,32 68,43 56,45"
          stroke-width="1"/>
    <path d="M47,32 C36,25 28,21 23,13 C15,27 24,42 40,45 C50,47 55,54 55,64"
          stroke-width="1.5"/>
    <path d="M45,36 C37,30 32,27 29,21 C24,32 32,43 44,45"
          stroke-width="1"/>
  </g>

  <!-- tail flowing down to the monogram -->
  <g fill="none" stroke="url(#sp-wing)" stroke-width="1.4" stroke-linecap="round">
    <path d="M45,64 C44,70 45,76 48,81"/>
    <path d="M55,64 C56,70 55,76 52,81"/>
  </g>

  <g font-family="Georgia, 'Iowan Old Style', serif" fill="#eef8ff">
    <text x="44" y="90" font-size="15" text-anchor="middle">S</text>
    <text x="57" y="86" font-size="15" text-anchor="middle">P</text>
  </g>
</svg>
