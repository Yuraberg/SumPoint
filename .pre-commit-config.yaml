# Pre-commit hooks — run `pre-commit install` to activate.
# After install, every `git commit` will scan for secrets and run ruff.
#
# See: https://pre-commit.com/
repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: >
          (?x)^(
            \.secrets\.baseline|
            poetry\.lock|
            package-lock\.json|
            yarn\.lock|
            requirements\.txt
          )$
